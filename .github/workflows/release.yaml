name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-version:
    name: 'Check version'
    runs-on: ubuntu-latest
    steps:
      - name: Install Nodejs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ env.FETCH_DEPTH }}

      - name: Validate package version matches git tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

  publish-code-marketplace:
    name: 'Publish (Code Marketplace)'
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Install Nodejs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Install Node dependencies.
      - run: npm ci

      # Publish to the Code Marketplace.
      - name: Publish Extension (Code Marketplace)
        run: npx vsce publish --pat ${{ secrets.MARKETPLACE_TOKEN }}

  publish-openvsx:
    name: 'Publish (OpenVSX)'
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - name: Install Nodejs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Install Node dependencies.
      - run: npm ci

      # Publish to OpenVSX.
      - name: Publish Extension (OpenVSX, release)
        run: npx ovsx publish --pat ${{ secrets.OPENVSX_TOKEN }}
        timeout-minutes: 2
